<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dry Run Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F4F6;--white:#fff;--border:#E4E4E7;--text:#18181B;--text2:#71717A;--text3:#A1A1AA;--blue:#3B82F6;--blue-bg:#EFF6FF;--green-bg:#F0FDF4;--green:#16A34A;--r:12px;--rs:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:flex-start;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;color:var(--text);text-decoration:none}
.logo-icon{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:8px;margin-left:20px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;color:var(--text2);font-size:14px;cursor:pointer;border:none;background:none;transition:color .15s,background .15s}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{color:var(--blue);font-weight:500}
.page{display:none;padding:32px;max-width:1000px;margin:0 auto}
.page.active{display:block}
.toolbar{display:flex;gap:10px;margin-bottom:28px;align-items:center}
.btn-p{display:flex;align-items:center;gap:6px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-p:hover{opacity:.85}
.btn-s{display:flex;align-items:center;gap:6px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;font-size:14px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-s:hover{background:var(--bg)}
.sw{flex:1;position:relative;max-width:440px}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.si{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--white);outline:none;transition:border-color .15s}
.si:focus{border-color:var(--blue)}
.si::placeholder{color:var(--text3)}
.sec-title{font-size:18px;font-weight:600;margin-bottom:14px;margin-top:8px}
.card-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.dr-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:16px}
.avatar{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar.up{background:var(--blue-bg)}
.avatar.up svg{stroke:var(--blue)}
.avatar.dn{background:var(--green-bg)}
.avatar.dn svg{stroke:var(--green)}
.card-info{flex:1}
.card-name{font-size:15px;font-weight:600;margin-bottom:4px}
.card-meta{display:flex;gap:12px;color:var(--text2);font-size:13px;flex-wrap:wrap;align-items:center}
.dot{color:var(--text3)}
.lvl-badge{font-size:12px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--blue-bg);color:var(--blue)}
.lvl-badge.dn{background:var(--green-bg);color:var(--green)}
.btn-edit{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:var(--rs);padding:6px 14px;font-size:13px;background:var(--white);color:var(--text);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-edit:hover{background:var(--bg)}
.q-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.q-head{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.q-title{font-size:15px;font-weight:600}
.chips{display:flex;gap:6px}
.chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;background:var(--white);transition:all .15s;user-select:none}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.ha{margin-left:auto;display:flex;gap:6px}
.ib{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ib:hover{background:var(--bg)}
.ib.danger:hover{background:#FEF2F2;border-color:#FCA5A5}
.ib.danger:hover svg{stroke:#EF4444}
.q-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.q-row:last-child{border-bottom:none}
.q-row:hover{background:#FAFAFA}
.qck{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qck.on{background:var(--blue);border-color:var(--blue)}
.qck.on::after{content:'';display:block;width:4px;height:7px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.q-txt{flex:1;font-size:14px;line-height:1.45;color:var(--text)}
.q-tags{display:flex;gap:6px;align-items:center;flex-shrink:0}
.stag{font-size:12px;padding:3px 8px;border-radius:6px;background:var(--bg);color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ltag{font-size:12px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.ltag.A1{background:#EFF6FF;color:#2563EB}
.ltag.A2{background:#F0FDF4;color:#16A34A}
.ltag.A3{background:#FFFBEB;color:#D97706}
.ltag.A4{background:#FDF4FF;color:#9333EA}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty p{margin-top:8px;font-size:13px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--white);border-radius:var(--r);padding:28px;width:480px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px}
.fg{margin-bottom:16px}
.fl{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block}
.fi{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.fi:focus{border-color:var(--blue)}
.fr{display:flex;gap:12px}
.fr .fg{flex:1}
select.fi{background:var(--white)}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.cb{font-size:11px;background:var(--bg);color:var(--text2);padding:1px 6px;border-radius:10px;margin-left:2px}
.uf{margin:0 20px 16px;padding:10px 14px;background:var(--green-bg);border:1px solid #86EFAC;border-radius:var(--rs);color:var(--green);font-size:13px;display:none}

/* INTERVIEW PAGE */
.iv-header{padding:28px 32px 20px;max-width:1000px;margin:0 auto;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.iv-title{font-size:22px;font-weight:700;margin-bottom:6px}
.iv-meta{display:flex;gap:12px;color:var(--text2);font-size:13px;flex-wrap:wrap;align-items:center}
.iv-body{max-width:1000px;margin:0 auto;padding:0 32px 32px}

/* Tabs */
.iv-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px;width:fit-content}
.iv-tab{padding:7px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);transition:all .15s}
.iv-tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Question cards */
.iv-q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.iv-q-card:hover{border-color:#CBD5E1}
.iv-q-card.active-q{border-color:var(--blue);border-width:2px}
.iv-q-num{font-size:13px;color:var(--text2);margin-bottom:8px}
.iv-q-text{font-size:15px;font-weight:500;line-height:1.45;margin-bottom:16px}
.iv-notes-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.iv-notes-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}

/* Bullet textarea */
.bullet-area{width:100%;min-height:88px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:14px;font-family:inherit;resize:none;outline:none;transition:border-color .15s;color:var(--text);line-height:1.6;overflow:hidden}
.bullet-area:focus{border-color:var(--blue);background:var(--white)}
.bullet-area::placeholder{color:var(--text3)}

/* Decision chips active state */
#fb-decision .chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Question builder */
.qb-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px}
.qb-title{font-size:17px;font-weight:600;margin-bottom:20px}
.qb-section{margin-bottom:20px}
.qb-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.level-btns{display:flex;gap:8px}
.level-btn{padding:8px 24px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text)}
.level-btn:hover{border-color:var(--blue);color:var(--blue)}
.level-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.skill-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.skill-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;transition:all .15s;color:var(--text2);user-select:none;text-align:left}
.skill-chip:hover{border-color:var(--blue);color:var(--blue)}
.skill-chip.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);font-weight:500}

/* Generated questions */
.qb-q-item{display:flex;align-items:flex-start;gap:0;padding:14px 0;border-bottom:1px solid var(--border)}
.qb-q-item:last-child{border-bottom:none}
.qb-q-item.dragging{opacity:.4}
.qb-q-item.drag-over{border-top:2px solid var(--blue)}
.qb-q-drag{display:flex;align-items:center;color:var(--text3);cursor:grab;flex-shrink:0;padding-top:2px;margin-right:8px}
.qb-q-drag:active{cursor:grabbing}
.qb-q-num{font-size:13px;color:var(--text3);flex-shrink:0;padding-top:1px;margin-right:8px}
.qb-q-body{flex:1;min-width:0}
.qb-q-main{display:flex;align-items:flex-start;gap:12px}
.qb-q-text{font-size:14px;line-height:1.45;color:var(--text);margin-bottom:4px;flex:1;min-width:0}
.qb-q-del{flex-shrink:0;background:none;border:none;cursor:pointer;padding:2px 4px;color:#ef4444;display:flex;align-items:center;opacity:.7;transition:opacity .15s}
.qb-q-del:hover{opacity:1}
.qb-q-actions{display:flex;gap:6px;margin-top:8px}
.qb-q-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--blue-bg);color:var(--blue)}
.qb-q-btn{font-size:12px;padding:3px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .15s}
.qb-q-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.qb-q-btn:disabled{opacity:.35;cursor:not-allowed}
.qb-q-btn.del:hover{border-color:#ef4444;color:#ef4444}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    Dry Run Manager
  </div>
  <div class="nav-links">
    <button class="nav-btn active" id="nb-d" onclick="showPage('d')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Дашборд
    </button>
    <button class="nav-btn" id="nb-q" onclick="showPage('q')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Питання
    </button>
  </div>
</nav>

<div class="page active" id="page-d">

  <!-- Question builder form -->
  <div class="qb-box">
    <div class="qb-title">Сформувати питання для драй-рану</div>

    <!-- Step 1: level -->
    <div class="qb-section">
      <div class="qb-label">Рівень кандидата</div>
      <div class="level-btns" id="level-btns">
        <button class="level-btn" onclick="selectLevel('Junior')">Junior</button>
        <button class="level-btn" onclick="selectLevel('Middle')">Middle</button>
        <button class="level-btn" onclick="selectLevel('Senior')">Senior</button>
      </div>
    </div>

    <!-- Step 2: skill categories (shown after level selected) -->
    <div class="qb-section" id="skills-section" style="display:none">
      <div class="qb-label">Категорії скілів <span id="skills-hint" style="font-weight:400;color:var(--text3)"></span></div>
      <div class="skill-chips" id="skill-chips"></div>
    </div>

    <!-- Generate button -->
    <div id="qb-action" style="display:none;gap:10px;align-items:center;margin-top:20px">
      <button class="btn-p" onclick="buildQuestions()">
        <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Сформувати питання
      </button>
      <button class="btn-s" id="btn-add-to-list" onclick="appendQuestions()" style="display:none">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Додати питання в список
      </button>
    </div>

    <!-- Generated question list -->
    <div id="qb-result" style="display:none">
      <div style="height:1px;background:var(--border);margin:24px 0"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="qb-label" style="margin:0">Список питань <span id="qb-count" style="font-weight:400;color:var(--text3)"></span></div>
      </div>
      <div id="qb-questions"></div>
      <div style="display:flex;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <button class="btn-s" id="copy-loop-btn" onclick="copyToLoop()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Копіювати в Loop
        </button>
        <button class="btn-s" id="copy-excel-btn" onclick="copyToExcel()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>
          Копіювати в Excel
        </button>
      </div>
    </div>
  </div>
</div>

<!-- INTERVIEW PAGE -->
<div class="page" id="page-iv">
  <div class="iv-header">
    <div>
      <div class="iv-title" id="iv-name"></div>
      <div class="iv-meta" id="iv-meta"></div>
    </div>
    <button class="btn-s" onclick="showPage('d')">Повернутися</button>
  </div>
  <div class="iv-body">
    <div class="iv-tabs">
      <button class="iv-tab active" id="tab-q" onclick="switchTab('q')">Питання та нотатки</button>
      <button class="iv-tab" id="tab-f" onclick="switchTab('f')">Фідбек</button>
    </div>
    <div id="iv-tab-q">
      <div id="iv-questions"></div>
    </div>
    <div id="iv-tab-f" style="display:none">
      <button class="btn-p" style="margin-bottom:20px;gap:8px" onclick="generateFeedback()" id="gen-btn">
        <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Згенерувати фідбек
      </button>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:12px">
        <div style="font-size:15px;font-weight:600;margin-bottom:14px">Загальний фідбек</div>
        <textarea class="bullet-area" id="fb-generated" placeholder="Автоматично згенерований фідбек з'явиться тут або додайте власний..." onkeydown="handleBullet(event)" oninput="autoResize(this);persistFeedback()" style="font-family:inherit"></textarea>
      </div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:20px">
        <div style="font-size:15px;font-weight:600;margin-bottom:14px">Рекомендації</div>
        <textarea class="bullet-area" id="fb-recs" placeholder="Додайте рекомендації щодо подальших кроків..." onkeydown="handleBullet(event)" onfocus="initBullet(this)" oninput="autoResize(this);persistFeedback()" style="font-family:inherit"></textarea>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px">
        <span style="font-size:13px;font-weight:500;color:var(--text2)">Рішення:</span>
        <div style="display:flex;gap:8px" id="fb-decision">
          <button class="chip" onclick="setDecision('hire')" id="dec-hire">✓ Рекомендую</button>
          <button class="chip" onclick="setDecision('maybe')" id="dec-maybe">Під питанням</button>
          <button class="chip" onclick="setDecision('no')" id="dec-no">Не рекомендую</button>
        </div>
      </div>
      <button class="btn-p" onclick="saveFeedback()">
        <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Зберегти
      </button>
    </div>
  </div>
</div>

<div class="page" id="page-q">
  <div class="toolbar">
    <button class="btn-p" onclick="openQModal()">
      <svg width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Нове питання
    </button>
    <button class="btn-s" onclick="document.getElementById('fu').click()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Завантажити файл
    </button>
    <input type="file" id="fu" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleUpload(event)"/>
    <div class="sw">
      <svg width="14" height="14" fill="none" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="si" type="text" placeholder="Пошук питань" id="qs" oninput="renderQ()"/>
    </div>
  </div>
  <div class="q-box">
    <div class="q-head">
      <span class="q-title">Список питань</span>
      <div class="chips" id="chips"></div>
      <div class="ha">
        <button class="ib" title="Вибрати все" onclick="selAll()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="ib danger" title="Видалити вибрані" onclick="delSel()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>
    <div id="q-list"></div>
    <div id="uf" class="uf"></div>
  </div>
</div>

<!-- DR Modal -->
<div class="ov" id="ov-dr" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2>Новий драй-ран</h2>
    <div class="fg"><label class="fl">Ім'я кандидата</label><input class="fi" id="fn" type="text" placeholder="Олександр Петренко"/></div>
    <div class="fr">
      <div class="fg"><label class="fl">Рівень</label>
        <select class="fi" id="fl2"><option>A1</option><option>A2</option><option selected>A3</option><option>A4</option><option>Middle</option><option>Senior</option></select>
      </div>
      <div class="fg"><label class="fl">Дата та час</label><input class="fi" id="fd" type="datetime-local"/></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">RM</label><input class="fi" id="frm" type="text" placeholder="Марія Іваненко"/></div>
      <div class="fg"><label class="fl">Інтерв'юер</label><input class="fi" id="fi2" type="text" placeholder="Олег"/></div>
    </div>
    <div class="ma">
      <button class="btn-s" onclick="document.getElementById('ov-dr').classList.remove('open')">Скасувати</button>
      <button class="btn-p" onclick="saveDR()">Зберегти</button>
    </div>
  </div>
</div>

<!-- Q Modal -->
<div class="ov" id="ov-q" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2>Нове питання</h2>
    <div class="fg"><label class="fl">Текст питання</label><textarea class="fi" id="qt" rows="3" placeholder="Введіть питання..."></textarea></div>
    <div class="fr">
      <div class="fg"><label class="fl">Скіл</label><input class="fi" id="qsk" type="text" placeholder="Design Process"/></div>
      <div class="fg"><label class="fl">Рівні (через кому)</label><input class="fi" id="qlv" type="text" placeholder="A1, A2"/></div>
    </div>
    <div class="ma">
      <button class="btn-s" onclick="document.getElementById('ov-q').classList.remove('open')">Скасувати</button>
      <button class="btn-p" onclick="saveQ()">Додати</button>
    </div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
